# ============================================================
# Squid Proxy — Allowlist-Only Egress Control
# ============================================================
# Default: DENY ALL. Only domains in allowed-domains.txt pass.
# SSH CONNECT tunneling allowed only to trusted hosts.
# ============================================================

http_port 3128

# --- ACL definitions ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 22
acl SSH_port port 22
acl CONNECT method CONNECT

# Domain allowlist (loaded from file)
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# Local/private networks (add your own if needed)
# acl local_nets dst 192.168.1.0/24

# Trusted hosts for SSH CONNECT tunneling
acl trusted_hosts dstdomain .github.com
acl trusted_hosts dstdomain .gitlab.com

# --- Access rules (ORDER MATTERS) ---

# Block non-safe ports
http_access deny !Safe_ports

# Allow SSH CONNECT only to trusted hosts
http_access allow CONNECT SSH_port trusted_hosts
# http_access allow CONNECT SSH_port local_nets    # uncomment for LAN SSH

# Block CONNECT to non-SSL ports (prevent port abuse)
http_access deny CONNECT !SSL_ports

# Allow HTTP/HTTPS to allowlisted domains
http_access allow allowed_domains
# http_access allow local_nets                     # uncomment for LAN HTTP

# Block everything else
http_access deny all

# --- Timeouts (tuned for long-running AI agents) ---
connect_timeout 60 seconds
read_timeout 30 minutes
client_lifetime 12 hours
pconn_timeout 5 minutes
request_timeout 10 minutes

# --- Privacy ---
forwarded_for delete

# --- Cache ---
cache_dir ufs /var/spool/squid 100 16 256
maximum_object_size 50 MB

# --- Logging ---
access_log daemon:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
logfile_rotate 5

# --- Limits ---
max_filedescriptors 4096
