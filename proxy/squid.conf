# ============================================================
# Squid Proxy — Allowlist-Only Egress Control
# ============================================================
# Default: DENY ALL. Only explicitly allowed targets pass.
# Three allowlist files control access:
#   allowed-domains.txt      — HTTP/HTTPS by domain name
#   trusted-ssh-hosts.txt    — SSH CONNECT by domain name
#   allowed-networks.txt     — all ports by IP/CIDR
# ============================================================

http_port 3128

# --- ACL definitions ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 22
acl SSH_port port 22
acl CONNECT method CONNECT

# Domain allowlist — HTTP/HTTPS (loaded from file)
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# SSH host allowlist — domains for SSH CONNECT (loaded from file)
acl trusted_ssh_hosts dstdomain "/etc/squid/trusted-ssh-hosts.txt"

# Network allowlist — IPs/CIDRs, all ports (loaded from file)
acl allowed_networks dst "/etc/squid/allowed-networks.txt"

# --- Access rules (ORDER MATTERS) ---

# Allowed networks: all ports open. If you explicitly allow an IP/CIDR,
# you trust it — no port restrictions. Must come BEFORE deny !Safe_ports.
http_access allow CONNECT allowed_networks
http_access allow allowed_networks

# Block non-safe ports (applies to domain-based rules below, not networks)
http_access deny !Safe_ports

# Allow SSH CONNECT to trusted domains (GitHub, GitLab, user-added)
http_access allow CONNECT SSH_port trusted_ssh_hosts

# Block CONNECT to non-SSL ports (for domain-based rules)
http_access deny CONNECT !SSL_ports

# Allow HTTP/HTTPS to allowlisted domains
http_access allow allowed_domains

# Block everything else
http_access deny all

# --- Timeouts (tuned for long-running AI agents) ---
connect_timeout 60 seconds
read_timeout 30 minutes
client_lifetime 12 hours
pconn_timeout 5 minutes
request_timeout 10 minutes

# --- Privacy ---
forwarded_for delete

# --- Cache ---
cache_dir ufs /var/spool/squid 100 16 256
maximum_object_size 50 MB

# --- Logging ---
access_log daemon:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
logfile_rotate 5

# --- Limits ---
max_filedescriptors 4096
